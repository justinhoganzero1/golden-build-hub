workflows:
  android-aab-release:
    name: Oracle Lunar — Android AAB (Play Store)
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: 20
      java: 17
      groups:
        - android_signing   # define ANDROID_KEYSTORE (base64), CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD in Codemagic UI
      vars:
        PACKAGE_NAME: "app.oraclelunar.ai"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci || npm install
      - name: Build web assets (Vite)
        script: |
          npm run build
      - name: Add Android platform if missing
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: Capacitor sync
        script: |
          npx cap sync android
      - name: Decode signing keystore
        script: |
          echo "$ANDROID_KEYSTORE" | base64 --decode > $CM_BUILD_DIR/android/app/release.keystore
      - name: Configure signing in build.gradle
        script: |
          cat >> $CM_BUILD_DIR/android/app/build.gradle <<'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword System.getenv("CM_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("CM_KEY_ALIAS")
                      keyPassword System.getenv("CM_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF
      - name: Build signed Android App Bundle
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - justinbretthogan@gmail.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS  # Google Play service account JSON (set in Codemagic UI)
        track: internal                                    # promote to alpha/beta/production from Play Console
        submit_as_draft: true

  ios-ipa-release:
    name: Oracle Lunar — iOS IPA (App Store)
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "Oracle Lunar ASC"   # configure in Codemagic → Teams → Integrations → App Store Connect
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "app.oraclelunar.ai"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.oraclelunar.ai
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci || npm install
      - name: Build web assets (Vite)
        script: |
          npm run build
      - name: Add iOS platform if missing
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Capacitor sync
        script: |
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Set up provisioning profiles
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Build IPA for App Store
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app.dSYM
    publishing:
      email:
        recipients:
          - justinbretthogan@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"

